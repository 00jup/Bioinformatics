name: bioinfo
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # Python 3.10~3.13 모두 OK (conda-forge가 모든 버전 지원)
  - python>=3.10,<3.14
  - pip

  # 핵심 ML / 데이터
  - numpy>=1.24
  - pandas>=2.0
  - scikit-learn>=1.3
  - xgboost>=2.0
  - lightgbm>=4.0
  - matplotlib>=3.7
  - seaborn>=0.12
  - rdkit>=2022.9.1
  - shap>=0.43
  - joblib>=1.3

  # HTTP / 유틸
  - tenacity>=8.2.0
  - requests-cache>=1.1.0
  - tqdm>=4.66.0

  # 개발용
  - ruff
  - pytest>=7.4.0
  - pytest-mock>=3.11.0

  # PyTDC 는 pip 전용 + 옛 sklearn 핀 강제로 충돌 유발
  # 데이터 첫 다운로드 시에만 필요. 평소엔 빼는 게 안전.
  # 필요하면 환경 활성화 후 별도로:  pip install PyTDC
