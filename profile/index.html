<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>홍길동</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #f5f0eb;
            color: #2c2c2c;
            min-height: 100vh;
        }

        /* ── 상단 커버 ── */
        .cover {
            height: 220px;
            background: #3d3024;
            position: relative;
        }
        .cover::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 60px;
            background: linear-gradient(transparent, #f5f0eb);
        }

        /* ── 메인 영역 ── */
        .wrap {
            max-width: 600px;
            margin: -80px auto 0;
            padding: 0 24px 60px;
            position: relative;
        }

        /* ── 프로필 사진 ── */
        .photo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #f5f0eb;
            background: #c4b49a url('profile.jpg') center/cover no-repeat;
            margin-bottom: 20px;
        }
        /* 사진 없을 때 이니셜 표시 */
        .photo-fallback {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #f5f0eb;
            background: #c4b49a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', serif;
            font-size: 40px;
            color: #fff;
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 4px;
        }

        .sub {
            font-size: 13px;
            color: #8a7e72;
            font-weight: 300;
            letter-spacing: 0.5px;
            margin-bottom: 28px;
        }

        /* ── 자기소개 ── */
        .bio {
            font-size: 15px;
            line-height: 1.85;
            color: #4a4a4a;
            font-weight: 300;
            margin-bottom: 36px;
            word-break: keep-all;
        }
        .bio strong {
            font-weight: 400;
            color: #2c2c2c;
        }

        /* ── 구분선 ── */
        hr {
            border: none;
            height: 1px;
            background: #d9d0c7;
            margin-bottom: 28px;
        }

        .section-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #a09585;
            margin-bottom: 16px;
        }

        /* ── 링크들 ── */
        .links {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 36px;
        }

        .links a {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            border-radius: 10px;
            background: #fff;
            color: #2c2c2c;
            text-decoration: none;
            font-size: 14px;
            font-weight: 400;
            transition: all 0.15s ease;
            border: 1px solid #e8e2db;
        }

        .links a:hover {
            background: #faf7f4;
            border-color: #c4b49a;
            transform: translateX(4px);
        }

        .links a .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .links a .label {
            flex: 1;
        }

        .links a .arrow {
            font-size: 12px;
            color: #bbb;
            transition: color 0.15s;
        }
        .links a:hover .arrow { color: #8a7e72; }

        /* dot 색상 */
        .dot.blog   { background: #e07850; }
        .dot.yt     { background: #c0392b; }
        .dot.insta  { background: #c0539e; }
        .dot.github { background: #555; }
        .dot.email  { background: #3578b5; }

        /* ── 하단 ── */
        .footer {
            text-align: center;
            font-size: 11px;
            color: #b5aa9e;
            font-weight: 300;
        }

        /* ── 반응형 ── */
        @media (max-width: 480px) {
            .cover { height: 160px; }
            .wrap { margin-top: -60px; }
            h1 { font-size: 26px; }
        }
    </style>
</head>
<body>

    <div class="cover"></div>

    <div class="wrap">
        <!-- 프로필: profile.jpg 있으면 .photo 사용, 없으면 .photo-fallback -->
        <div class="photo-fallback">G</div>

        <h1>홍길동</h1>
        <p class="sub">중앙대학교 바이오메디컬공학과</p>

        <div class="bio">
            커피 마시면서 코드 짜는 걸 좋아하는 대학생입니다.<br>
            요즘은 <strong>생물정보학</strong>이랑 <strong>데이터 분석</strong>에
            빠져 있고, Python으로 이것저것 만들어보는 중이에요.
            가끔 블로그에 공부한 거 정리하고, 유튜브에 브이로그 올립니다.
        </div>

        <hr>
        <p class="section-label">Links</p>

        <div class="links">
            <a href="https://blog.example.com" target="_blank">
                <span class="dot blog"></span>
                <span class="label">Blog</span>
                <span class="arrow">&rarr;</span>
            </a>
            <a href="https://youtube.com/@example" target="_blank">
                <span class="dot yt"></span>
                <span class="label">YouTube</span>
                <span class="arrow">&rarr;</span>
            </a>
            <a href="https://instagram.com/example" target="_blank">
                <span class="dot insta"></span>
                <span class="label">Instagram</span>
                <span class="arrow">&rarr;</span>
            </a>
            <a href="https://github.com/example" target="_blank">
                <span class="dot github"></span>
                <span class="label">GitHub</span>
                <span class="arrow">&rarr;</span>
            </a>
            <a href="mailto:example@cau.ac.kr">
                <span class="dot email"></span>
                <span class="label">example@cau.ac.kr</span>
                <span class="arrow">&rarr;</span>
            </a>
        </div>

        <p class="footer">2026</p>
    </div>

</body>
</html>
